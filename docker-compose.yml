services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: basestream-app
    # Override Railway CMD: local dev uses separate nginx container
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      - postgres
      - redis
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    networks:
      - basestream

  nginx:
    image: nginx:alpine
    container_name: basestream-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - basestream

  postgres:
    image: postgres:16-alpine
    container_name: basestream-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: basestream
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-basestream_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - basestream

  redis:
    image: redis:alpine
    container_name: basestream-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - basestream

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  basestream:
    driver: bridge
